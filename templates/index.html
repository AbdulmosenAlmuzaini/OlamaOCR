<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة olmOCR لتحليل المستندات</title>
    <!-- Google Fonts: Cairo (Arabic) & Inter (English) -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="static/css/style.css">
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Top Navigation Bar -->
        <header class="app-header">
            <div class="header-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19ZM13.96 12.29L11.21 15.83L9.25 13.47L6.5 17H17.5L13.96 12.29Z" fill="currentColor"/>
                </svg>
                <h1>منصة olmOCR</h1>
            </div>
            
            <div class="header-actions">
                <button id="upload-new-btn" class="btn btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                    </svg>
                    <span>رفع مستند جديد</span>
                </button>
            </div>
        </header>

        <!-- Initial Upload View -->
        <main id="upload-view" class="main-content center-content">
            <div class="upload-card">
                <div class="upload-icon">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="12" y1="18" x2="12" y2="12"/>
                        <line x1="9" y1="15" x2="15" y2="15"/>
                    </svg>
                </div>
                <h2>قم بسحب وإفلات ملف الـ PDF أو الصور هنا</h2>
                <p>يدعم المستندات بصيغة PDF، PNG، JPEG، WebP</p>
                <div class="upload-btn-wrapper">
                    <button class="btn btn-primary">اختر ملفاً</button>
                    <input type="file" id="file-input" accept=".pdf, .png, .jpg, .jpeg, .webp">
                </div>
            </div>
        </main>

        <!-- Workspace View (Split Pane) -->
        <main id="workspace-view" class="main-content split-view" style="display: none;">
            
            <!-- Left Pane: PDF Page Preview -->
            <section class="pane left-pane">
                <div class="pane-header">
                    <div class="page-controls">
                        <button id="prev-page-btn" class="btn btn-icon" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"/>
                            </svg>
                        </button>
                        <span id="page-indicator">صفحة 1 من 1</span>
                        <button id="next-page-btn" class="btn btn-icon" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 18 9 12 15 6"/>
                            </svg>
                        </button>
                    </div>
                    <div class="view-controls">
                        <button id="zoom-out-btn" class="btn btn-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                        </button>
                        <span id="zoom-indicator">100%</span>
                        <button id="zoom-in-btn" class="btn btn-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="pane-body image-viewport">
                    <div class="image-wrapper" id="image-wrapper">
                        <img id="page-image" src="" alt="صفحة المستند">
                    </div>
                </div>
            </section>

            <!-- Right Pane: OCR Text Output -->
            <section class="pane right-pane">
                <div class="pane-header">
                    <h2 class="pane-title" id="page-title">صفحة 1</h2>
                    
                    <div class="ocr-stats-actions">
                        <span id="tokens-counter" class="tokens-badge" style="display: none;">980 tokens processed</span>
                        <span id="duration-counter" class="duration-badge" style="display: none;">0.0s</span>
                        <button id="copy-btn" class="btn btn-outline" style="display: none;">
                            <svg class="copy-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                            <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                            <span>نسخ</span>
                        </button>
                    </div>
                </div>
                
                <div class="pane-body ocr-viewport">
                    <!-- Processing / Loading Overlay -->
                    <div id="processing-overlay" class="overlay" style="display: none;">
                        <div class="spinner-container">
                            <span class="processing-text">جاري المعالجة...</span>
                            <div class="spinner"></div>
                        </div>
                    </div>

                    <!-- Not Processed Overlay / Run OCR Button -->
                    <div id="run-ocr-overlay" class="overlay">
                        <div class="run-ocr-container">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="12"/>
                                <line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                            <h3>هذه الصفحة لم تتم معالجتها بعد</h3>
                            <button id="trigger-ocr-btn" class="btn btn-primary btn-large">بدء المعالجة (OCR)</button>
                        </div>
                    </div>

                    <!-- Rendered Output Area -->
                    <div id="ocr-content" class="ocr-output-content" style="display: none;">
                        <!-- Markdown text will be rendered here -->
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                    <line x1="12" y1="9" x2="12" y2="13"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
            </div>
            <h3>تأكيد الإجراء</h3>
            <p>هل أنت متأكد من رغبتك في رفع مستند جديد؟ سيتم فقدان العمل الحالي.</p>
            <div class="modal-buttons">
                <button id="confirm-yes-btn" class="btn btn-primary">حسناً</button>
                <button id="confirm-no-btn" class="btn btn-secondary">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast"></div>

    <!-- App Logic -->
    <script src="static/js/app.js"></script>
</body>
</html>
